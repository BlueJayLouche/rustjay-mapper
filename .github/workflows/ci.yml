name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            features: "--no-default-features --features webcam"
          - name: macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            features: "--no-default-features --features webcam"
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: "--no-default-features --features webcam"
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            features: "--no-default-features --features webcam"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvulkan-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            cmake \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-ci-

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} ${{ matrix.features }} -- -D warnings

      - name: Build
        run: cargo build --target ${{ matrix.target }} ${{ matrix.features }}
